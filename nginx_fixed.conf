server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # 1. 基础静态文件服务 (3D Viewer)
    location / {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # 2. 日志接口转发 (新增部分)
    location /log_time {
        # 转发给宿主机的 Python 服务 (Docker 默认网关通常是 172.17.0.1)
        proxy_pass http://172.17.0.1:8001;
        
        # 强制添加 CORS 头 (即使后端返回错误，always 也能确保头存在，避免浏览器报 CORS 错掩盖真实错误)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, X-HOHONET-TOKEN' always;
        
        # 处理预检请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, X-HOHONET-TOKEN';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # 3. Label Studio 资源同源代理 (可选，但推荐)
    # 用途：让 3D Viewer 在同源下加载 Label Studio 的图片，避免 WebGL 纹理常见的 CORS 问题。
    # 访问示例：
    #   http://<server>:8000/ls/data/upload/...
    # 会被代理到：
    #   http://<server>:8080/data/upload/...
    location /ls/ {
        proxy_pass http://172.17.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
