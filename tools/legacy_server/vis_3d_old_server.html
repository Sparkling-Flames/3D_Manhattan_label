<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>3D Layout Visualization</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #111;
        color: white;
        font-family: sans-serif;
      }
      #info {
        position: absolute;
        top: 10px;
        left: 10px;
        pointer-events: none;
        background: rgba(0, 0, 0, 0.5);
        padding: 5px;
        border-radius: 4px;
      }
    </style>
    <!-- Load Three.js from local file -->
    <script src="three.min.js"></script>
    <script src="OrbitControls.js"></script>
  </head>
  <body>
    <div id="info">Status: Ready (Drag to Rotate, Scroll to Zoom)</div>
    <script>
      // --- Three.js Setup ---
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111111);

      const camera = new THREE.PerspectiveCamera(
        60, // FOV
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Add OrbitControls
      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.screenSpacePanning = false;
      controls.minDistance = 0.1;
      controls.maxDistance = 50;

      // Helpers
      // Grid and axes helpers (hidden by default). Use URL param `show_axes=1` to enable.
      const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
      gridHelper.position.y = -1.6; // Align grid with floor (y=-1.6)
      gridHelper.visible = false;
      scene.add(gridHelper);
      const axesHelper = new THREE.AxesHelper(2);
      axesHelper.visible = false;
      scene.add(axesHelper);

      let meshObjects = [];
      let W = 1024;
      let H = 512;
      let currentTexture = null;
      const textureLoader = new THREE.TextureLoader();

      // --- Shader Material for Equirectangular Projection ---
      // This ensures the texture is projected correctly onto the floor/ceiling/walls
      // regardless of the geometry shape.
      const panoMaterial = new THREE.ShaderMaterial({
        uniforms: {
          map: { value: null },
        },
        vertexShader: `
          varying vec3 vWorldPosition;
          void main() {
            vWorldPosition = (modelMatrix * vec4(position, 1.0)).xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D map;
          varying vec3 vWorldPosition;
          const float PI = 3.14159265359;

          void main() {
            vec3 dir = normalize(vWorldPosition);
            // Convert to spherical coordinates
            // atan(x, -z) matches the standard pano orientation
            float u = atan(dir.x, -dir.z) / (2.0 * PI) + 0.5;
            float v = asin(dir.y) / PI + 0.5;
            
            gl_FragColor = texture2D(map, vec2(u, v));
          }
        `,
        side: THREE.DoubleSide,
      });

      function updateStatus(msg) {
        document.getElementById("info").innerText = "Status: " + msg;
      }

      function makeTextSprite(message) {
        const canvas = document.createElement("canvas");
        const size = 64;
        canvas.width = size;
        canvas.height = size;
        const context = canvas.getContext("2d");

        // Circle background
        context.beginPath();
        context.arc(size / 2, size / 2, size / 2 - 2, 0, 2 * Math.PI, false);
        context.fillStyle = "rgba(255, 255, 0, 1)"; // Yellow
        context.fill();
        context.lineWidth = 4;
        context.strokeStyle = "black";
        context.stroke();

        // Text
        context.font = "bold 32px Arial";
        context.fillStyle = "black";
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.fillText(message, size / 2, size / 2);

        const texture = new THREE.Texture(canvas);
        texture.needsUpdate = true;
        const spriteMaterial = new THREE.SpriteMaterial({
          map: texture,
          depthTest: false,
        });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.scale.set(0.5, 0.5, 0.5); // 0.5m size
        sprite.renderOrder = 999; // Ensure it renders on top
        return sprite;
      }

      function drawLayout(corners, imageUrl) {
        console.log("Drawing layout with corners:", corners);
        meshObjects.forEach((o) => scene.remove(o));
        meshObjects = [];

        if (!corners || corners.length === 0) {
          updateStatus("No corners to render");
          return;
        }

        // Load texture if provided
        if (imageUrl) {
          console.log("Loading texture from URL:", imageUrl);
          textureLoader.load(
            imageUrl,
            (texture) => {
              console.log("Texture loaded successfully");
              currentTexture = texture;
              currentTexture.minFilter = THREE.LinearFilter;
              currentTexture.magFilter = THREE.LinearFilter;

              // Update shader uniform
              panoMaterial.uniforms.map.value = currentTexture;
              panoMaterial.needsUpdate = true;

              renderGeometry(corners, true);
            },
            undefined,
            (err) => {
              console.error("Error loading texture:", err);
              updateStatus("Error loading texture (CORS?): " + imageUrl);
              renderGeometry(corners, false);
            }
          );
        } else {
          console.log("No texture URL provided");
          renderGeometry(corners, false);
        }
      }

      function renderGeometry(corners, hasTexture) {
        // Clear again just in case
        meshObjects.forEach((o) => scene.remove(o));
        meshObjects = [];

        corners.sort((a, b) => a.x - b.x);

        const ceilPoints = [];
        const floorPoints = [];

        // --- 1. Reconstruct 3D Geometry ---
        // We assume camera height is 1.6m (standard for HoHoNet/Layout estimation)
        const CAM_H = 1.6;

        corners.forEach((c) => {
          // Convert image coordinates to angles
          // u: 0..W -> -PI..PI
          const u = (c.x / W) * 2 * Math.PI - Math.PI;
          // v: 0..H -> -PI/2..PI/2 (0 is top, H is bottom)
          // Formula: phi = (y / H - 0.5) * PI
          const v_floor_img = (c.y_floor / H - 0.5) * Math.PI;
          const v_ceil_img = (c.y_ceiling / H - 0.5) * Math.PI;

          // Calculate radial distance to the wall at the floor level
          // tan(pitch) = y / dist. Here y = -CAM_H (floor is below camera)
          // pitch is v_floor_img.
          // Note: v_floor_img is positive (looking down) or negative?
          // In image coords: 0 is top (-PI/2), H is bottom (PI/2).
          // So floor (bottom of image) has positive angle.
          // dist = CAM_H / tan(v_floor_img)

          // Clamp angle to avoid infinity
          const safe_v_floor = Math.max(0.01, Math.min(1.5, v_floor_img));
          const dist = CAM_H / Math.tan(safe_v_floor);

          // Calculate 3D coordinates
          // x = dist * sin(u)
          // z = -dist * cos(u)
          const x = dist * Math.sin(u);
          const z = -dist * Math.cos(u);

          // Floor y is fixed at -CAM_H
          const y_floor = -CAM_H;

          // Ceiling y
          // y_ceil = -dist * tan(v_ceil_img)
          // We clamp v_ceil_img to avoid infinity if it's exactly -PI/2
          const safe_v_ceil = Math.max(-1.5, Math.min(-0.01, v_ceil_img));
          const y_ceil = -dist * Math.tan(safe_v_ceil);

          ceilPoints.push(new THREE.Vector3(x, y_ceil, z));
          floorPoints.push(new THREE.Vector3(x, y_floor, z));
        });

        // Close the loop
        if (ceilPoints.length > 0) {
          ceilPoints.push(ceilPoints[0]);
          floorPoints.push(floorPoints[0]);
        }

        // --- 2. Create Meshes ---

        // Material to use
        const material = hasTexture
          ? panoMaterial
          : new THREE.MeshBasicMaterial({
              color: 0xcccccc,
              wireframe: true,
              transparent: true,
              opacity: 0.3,
              side: THREE.DoubleSide,
            });

        // A. Walls
        // We build a strip of quads
        const wallGeo = new THREE.BufferGeometry();
        const wallVertices = [];

        for (let i = 0; i < ceilPoints.length - 1; i++) {
          const p1 = ceilPoints[i];
          const p2 = floorPoints[i];
          const p3 = ceilPoints[i + 1];
          const p4 = floorPoints[i + 1];

          // Triangle 1: p1, p2, p3
          wallVertices.push(p1.x, p1.y, p1.z);
          wallVertices.push(p2.x, p2.y, p2.z);
          wallVertices.push(p3.x, p3.y, p3.z);

          // Triangle 2: p2, p4, p3
          wallVertices.push(p2.x, p2.y, p2.z);
          wallVertices.push(p4.x, p4.y, p4.z);
          wallVertices.push(p3.x, p3.y, p3.z);
        }
        wallGeo.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(wallVertices, 3)
        );
        const wallMesh = new THREE.Mesh(wallGeo, material);
        scene.add(wallMesh);
        meshObjects.push(wallMesh);

        // B. Floor (Fan from center)
        const floorGeo = new THREE.BufferGeometry();
        const floorVertices = [];
        const floorCenter = new THREE.Vector3(0, -CAM_H, 0);

        for (let i = 0; i < floorPoints.length - 1; i++) {
          const p1 = floorPoints[i];
          const p2 = floorPoints[i + 1];

          // Triangle: Center, p1, p2
          floorVertices.push(floorCenter.x, floorCenter.y, floorCenter.z);
          floorVertices.push(p1.x, p1.y, p1.z);
          floorVertices.push(p2.x, p2.y, p2.z);
        }
        floorGeo.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(floorVertices, 3)
        );
        const floorMesh = new THREE.Mesh(floorGeo, material);
        scene.add(floorMesh);
        meshObjects.push(floorMesh);

        // C. Ceiling - REMOVED for open top view

        // D. Wireframe (Edges)
        const lineMat = new THREE.LineBasicMaterial({
          color: 0x00ff00,
          depthTest: false,
        });
        const edges = [];
        for (let i = 0; i < ceilPoints.length - 1; i++) {
          // Vertical
          edges.push(ceilPoints[i].x, ceilPoints[i].y, ceilPoints[i].z);
          edges.push(floorPoints[i].x, floorPoints[i].y, floorPoints[i].z);
          // Ceiling
          edges.push(ceilPoints[i].x, ceilPoints[i].y, ceilPoints[i].z);
          edges.push(
            ceilPoints[i + 1].x,
            ceilPoints[i + 1].y,
            ceilPoints[i + 1].z
          );
          // Floor
          edges.push(floorPoints[i].x, floorPoints[i].y, floorPoints[i].z);
          edges.push(
            floorPoints[i + 1].x,
            floorPoints[i + 1].y,
            floorPoints[i + 1].z
          );
        }
        const lineGeo = new THREE.BufferGeometry();
        lineGeo.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(edges, 3)
        );
        const lineMesh = new THREE.LineSegments(lineGeo, lineMat);
        scene.add(lineMesh);
        meshObjects.push(lineMesh);

        // Add spheres for corners
        const sphereGeo = new THREE.SphereGeometry(0.1, 16, 16);
        const sphereMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        [...ceilPoints, ...floorPoints].forEach((p) => {
          const s = new THREE.Mesh(sphereGeo, sphereMat);
          s.position.copy(p);
          scene.add(s);
          meshObjects.push(s);
        });

        // Add Labels (Indices)
        floorPoints.forEach((p, idx) => {
          // Skip the last duplicated point if loop is closed
          if (idx >= corners.length) return;

          const sprite = makeTextSprite((idx + 1).toString());
          // Position slightly above the floor point
          sprite.position.copy(p).add(new THREE.Vector3(0, 0.5, 0));
          scene.add(sprite);
          meshObjects.push(sprite);
        });

        updateStatus(
          `Rendered ${corners.length} walls with ${
            hasTexture ? "Texture" : "Color"
          }`
        );

        // Update Camera to Bird's Eye View
        camera.position.set(0, 8, 0);
        camera.lookAt(0, -CAM_H, 0);
        controls.target.set(0, -CAM_H, 0);
        controls.update();
      }

      // Initial Camera Position (Bird's Eye View)
      camera.position.set(0, 8, 0);
      controls.target.set(0, -1.6, 0);
      controls.update();

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // --- Data Handling ---
      // 1. Initial data from URL
      try {
        const params = new URLSearchParams(window.location.search);
        const dataStr = params.get("data");
        const wStr = params.get("w");
        const hStr = params.get("h");

        if (wStr) W = parseInt(wStr);
        if (hStr) H = parseInt(hStr);

        if (dataStr) {
          const corners = JSON.parse(decodeURIComponent(dataStr));
          drawLayout(corners);
        }

        // Allow toggling grid/axes via URL param `show_axes=1`
        const showAxesParam = params.get("show_axes");
        if (showAxesParam === "1" || showAxesParam === "true") {
          gridHelper.visible = true;
          axesHelper.visible = true;
        }
      } catch (e) {
        console.error("Error parsing URL data", e);
        updateStatus("Error parsing data");
      }

      // 2. Listen for messages from Parent
      window.addEventListener("message", (event) => {
        console.log("Received message", event.data);
        if (event.data && event.data.type === "update_layout") {
          if (event.data.width) W = event.data.width;
          if (event.data.height) H = event.data.height;
          drawLayout(event.data.corners, event.data.imageUrl);
        }
      });
    </script>
  </body>
</html>
